name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          # Extract VERSION from build.sh
          VERSION=$(grep '^VERSION=' build.sh | cut -d'=' -f2)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Docker image locally for export
        run: |
          docker buildx build \
            --load \
            --build-arg TAILSCALE_VERSION=$(grep '^TAILSCALE_VERSION=' build.sh | cut -d'=' -f2) \
            --build-arg VERSION_LONG="$(cd tailscale && eval $(./build_dist.sh shellvars) && echo $VERSION_LONG)" \
            --build-arg VERSION_SHORT="$(cd tailscale && eval $(./build_dist.sh shellvars) && echo $VERSION_SHORT)" \
            --build-arg VERSION_GIT_HASH="$(cd tailscale && eval $(./build_dist.sh shellvars) && echo $VERSION_GIT_HASH)" \
            -t tailscale-mikrotik:local \
            .
          docker save tailscale-mikrotik:local -o tailscale-mikrotik.tar.gz

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tailscale-mikrotik-${{ steps.version.outputs.version }}
          path: tailscale-mikrotik.tar.gz

      - name: Create Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v1
        with:
          files: tailscale-mikrotik.tar.gz
          tag_name: v${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## Docker Image
            ```
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ```

            ## Changes
            - Tailscale version from build.sh
            - Platform: linux/arm64

            For more details, see the [build logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

