name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: meta
        run: |
          VERSION=$(grep '^VERSION=' build.sh | cut -d'=' -f2)
          TAILSCALE_VERSION=$(grep '^TAILSCALE_VERSION=' build.sh | cut -d'=' -f2)
          case "$TAILSCALE_VERSION" in
            v*) TS_GIT_REF="$TAILSCALE_VERSION" ;;
            *) TS_GIT_REF="v$TAILSCALE_VERSION" ;;
          esac
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tailscale_version=${TAILSCALE_VERSION}" >> $GITHUB_OUTPUT
          echo "ts_git_ref=${TS_GIT_REF}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Prepare tailscale source
        run: |
          if [ ! -f tailscale/go.mod ] || [ ! -f tailscale/go.sum ]; then
            rm -rf tailscale
            git -c advice.detachedHead=false clone https://github.com/tailscale/tailscale.git --branch "${{ steps.meta.outputs.ts_git_ref }}" tailscale
          fi
          test -f tailscale/go.mod
          test -f tailscale/go.sum

      - name: Compute tailscale build metadata
        id: tsvars
        run: |
          (
            cd tailscale
            TS_USE_TOOLCHAIN="Y"
            eval "$(./build_dist.sh shellvars)"
            echo "version_long=$VERSION_LONG" >> "$GITHUB_OUTPUT"
            echo "version_short=$VERSION_SHORT" >> "$GITHUB_OUTPUT"
            echo "version_git_hash=$VERSION_GIT_HASH" >> "$GITHUB_OUTPUT"
          )

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            TAILSCALE_VERSION=${{ steps.meta.outputs.tailscale_version }}
            VERSION_LONG=${{ steps.tsvars.outputs.version_long }}
            VERSION_SHORT=${{ steps.tsvars.outputs.version_short }}
            VERSION_GIT_HASH=${{ steps.tsvars.outputs.version_git_hash }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Docker image locally for export
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --build-arg TAILSCALE_VERSION="${{ steps.meta.outputs.tailscale_version }}" \
            --build-arg VERSION_LONG="${{ steps.tsvars.outputs.version_long }}" \
            --build-arg VERSION_SHORT="${{ steps.tsvars.outputs.version_short }}" \
            --build-arg VERSION_GIT_HASH="${{ steps.tsvars.outputs.version_git_hash }}" \
            --output type=docker,dest=tailscale-mikrotik.tar \
            .
          gzip -f tailscale-mikrotik.tar

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tailscale-mikrotik-${{ steps.meta.outputs.version }}
          path: tailscale-mikrotik.tar.gz

      - name: Create Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v1
        with:
          files: tailscale-mikrotik.tar.gz
          tag_name: v${{ steps.meta.outputs.version }}
          name: Release ${{ steps.meta.outputs.version }}
          body: |
            ## Docker Image
            ```
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ```

            ## Changes
            - Tailscale version from build.sh
            - Platform: linux/arm64

            For more details, see the [build logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

